  .now{background:var(--gold-soft);display:grid;gap:7px}
  .now small{
    font-family:'Space Grotesk','Noto Sans TC',sans-serif;

  }
  .now strong{font-size:1.18rem;line-height:1.35}

    padding:8px 0 12px; background:var(--paper);
    border-bottom:2px solid var(--line);
  }

  }

  .section-title{
    font-family:'Space Grotesk','Noto Sans TC',sans-serif;

  }

  .flow-card{

    border:3px solid var(--ink); border-radius:16px; background:#fff;
    box-shadow:3px 3px 0 var(--ink); padding:12px;
    color:var(--ink); font:inherit; display:grid; grid-template-columns:86px 1fr; gap:10px;

    font-family:'Space Grotesk','Noto Sans TC',sans-serif;
    font-weight:900; font-size:.82rem; line-height:1.1;

    background:#fff; color:var(--ink); box-shadow:2px 2px 0 var(--ink);

    display:grid; place-content:center; cursor:pointer; z-index:3;
    transition:opacity .12s, transform .12s, box-shadow .12s;

  }

  }

    font:900 .78rem/1.25 'Noto Sans TC',sans-serif;

  .pin-coord{
    display:none; position:absolute; left:50%; top:100%; transform:translateX(-50%);

    box-shadow:2px 2px 0 var(--ink); color:var(--ink);

    .pin{width:36px;height:36px;font-size:.72rem}

  }
</style>

  [12,'練韓文','A0413','行政大樓4F後','adminHall'],
  [13,'AI影像創作','A0411','行政大樓4F後','adminHall'],
  [14,'DJ入門','A0415','行政大樓4F後','adminHall'],
  [15,'咖啡師','A0417','行政大樓4F後','adminHall'],
  [16,'桌遊部落','D0530','設計大樓5F','design'],
  [17,'物理治療師','D0528','設計大樓5F','design'],
  [18,'KPOP舞蹈','W5B34-2','文薈館B1','wenhui']
];
let selectedDay = DAYS[0].id;
let selectedLoc = '';
let currentEvent = null;
let nextEvent = null;
let manualDay = false;
let flowDay = '';

const $ = selector => document.querySelector(selector);
const pad = value => String(value).padStart(2,'0');
function minutes(time){
  if(time.includes('前')) return 8 * 60 + 59;
  if(time === '全日') return 8 * 60;
  const [h,m] = time.split(':').map(Number);
  return h * 60 + m;
}
function rangeParts(range){
  if(range === '全日') return ['08:00','18:00'];
  if(range.includes('前')) return ['08:00',range.replace('前','')];
  return range.split('-');
}
function stamp(date, min){return Date.parse(`${date}T00:00:00+08:00`) + min * 60000}
function parseOverride(value){
  if(!value) return new Date();
  const raw = value.trim().replace(' ','T');
  if(/[zZ]|[+-]\d\d:?\d\d$/.test(raw)) return new Date(raw);
  return new Date(`${raw.length === 16 ? `${raw}:00` : raw}+08:00`);
}
function taipeiClock(date){
  const parts = new Intl.DateTimeFormat('en-CA',{
    timeZone:TZ,year:'numeric',month:'2-digit',day:'2-digit',
    hour:'2-digit',minute:'2-digit',hour12:false
  }).formatToParts(date).reduce((bag,part)=>(bag[part.type]=part.value,bag),{});
  const hour = Number(parts.hour === '24' ? '00' : parts.hour);
  return {date:`${parts.year}-${parts.month}-${parts.day}`,minute:hour * 60 + Number(parts.minute),label:`${parts.month}/${parts.day} ${pad(hour)}:${parts.minute}`};
}
function findNow(clock){
  const nowStamp = stamp(clock.date, clock.minute);
  let current = null;
  let next = null;
  DAYS.forEach(day => day.events.forEach((event, index) => {
    const [start,end] = rangeParts(event[0]);
    const item = {day,event,index,startStamp:stamp(day.id, minutes(start))};
    const endStamp = stamp(day.id, minutes(end));
    if(nowStamp >= item.startStamp && nowStamp < endStamp) current = item;
    if(item.startStamp > nowStamp && (!next || item.startStamp < next.startStamp)) next = item;
  }));
  return {current,next};
}
function renderTabs(){
  $('#dayTabs').innerHTML = DAYS.map(day => `
    <button class="tab" role="tab" type="button" data-day="${day.id}" aria-selected="false">
      ${day.tab}<small>${day.label.replace(day.tab,'')}</small>
    </button>
  `).join('');
}
function updateTabsSelected(){
  document.querySelectorAll('.tab').forEach(button => {
    button.setAttribute('aria-selected', String(button.dataset.day === selectedDay));
  });
}
function renderFlow(){
  const day = DAYS.find(item => item.id === selectedDay) || DAYS[0];
  flowDay = day.id;
  $('#dayTitle').textContent = day.label;
  $('#flow').innerHTML = day.events.map((event,index) => {
    const loc = LOCATIONS[event[2]];
    const isNow = currentEvent?.day.id === day.id && currentEvent.index === index;
    return `<button class="flow-card ${isNow ? 'is-now' : ''}" type="button" data-loc="${event[2]}" data-index="${index}">
      <span class="time">${timeBadge(event[0])}</span>
      <span>
        <span class="title">${event[1]}</span>
        <span class="meta">${isNow ? '<span class="pill now-pill">現在</span>' : ''}<span class="pill">${loc.kind}</span><span>${event[3]}</span></span>
      </span>
    </button>`;
  }).join('');
}
function updateFlowNow(){
  document.querySelectorAll('.flow-card').forEach(card => {
    const isNow = currentEvent?.day.id === selectedDay && String(currentEvent.index) === card.dataset.index;
    card.classList.toggle('is-now', isNow);
    const meta = card.querySelector('.meta');
    meta?.querySelector('.now-pill')?.remove();
    if(isNow) meta?.insertAdjacentHTML('afterbegin', '<span class="pill now-pill">現在</span>');
  });
}
function renderCourses(){
  $('#courses').innerHTML = COURSES.map(course => `
    <button class="course-card" type="button" data-loc="${course[4]}">
      <b>${course[0]}</b>
      <span><b>${course[1]}</b><small>${course[2]} · ${course[3]}</small></span>
    </button>
  `).join('');
}
function renderPins(){
  $('#mapStage').querySelectorAll('.pin').forEach(pin => pin.remove());
  PIN_IDS.forEach(id => {
    const loc = LOCATIONS[id];
    const button = document.createElement('button');
    button.type = 'button';
    button.className = `pin ${['stairs','designArea'].includes(id) ? 'group' : ''} ${loc.approx ? 'approx' : ''}`;
    button.dataset.loc = id;
    button.dataset.title = loc.title;
    button.style.setProperty('--x', `${loc.x}%`);
    button.style.setProperty('--y', `${loc.y}%`);
    button.textContent = loc.code;
    button.setAttribute('aria-label', loc.title);
    button.insertAdjacentHTML('beforeend', `<span class="pin-coord">${loc.x},${loc.y}</span>`);
    $('#mapStage').append(button);
  });
  checkPinDistances();
}
function timeBadge(range){
  if(range === '全日' || range.includes('前')) return range;
  const [start,end] = range.split('-');
  return `${start}<span>${end}</span>`;
}
function mapUrl(loc){
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(loc.query)}`;
}
function noteFor(loc){
  return `${loc.approx ? '📍 約略位置，以現場公告為準。' : ''}${loc.note}`;
}
function selectLocation(id, jump, userAction, toggleSame){
  if(selectedLoc === id && $('#mapStage').classList.contains('has-selection') && toggleSame){
    clearSelection(true);
    return;
  }
  selectedLoc = id;
  const loc = LOCATIONS[id] || LOCATIONS.stu;
  $('#mapStage').classList.add('has-selection');
  document.querySelectorAll('.pin').forEach(pin => pin.classList.toggle('is-on', pin.dataset.loc === id));
  $('#placeCard').innerHTML = `
    <div class="place-tags"><span class="pill">${loc.kind}</span><span>${loc.code}</span>${loc.approx ? '<span class="pill">約略</span>' : ''}</div>
    <h2>${loc.title}</h2>
    ${loc.aliases?.length ? `<div class="aliases">${loc.aliases.map(alias => `<span class="alias">${alias}</span>`).join('')}</div>` : ''}
    <p>${noteFor(loc)}</p>
    <a class="gmaps" href="${mapUrl(loc)}" target="_blank" rel="noopener">開 Google Maps</a>
  `;
  if(userAction) history.replaceState(null, '', `#${id}`);
  if(jump) $('#mapShell').scrollIntoView({behavior:'smooth', block:'start'});
}
function clearSelection(userAction){
  selectedLoc = '';
  $('#mapStage').classList.remove('has-selection');
  document.querySelectorAll('.pin').forEach(pin => pin.classList.remove('is-on'));
  $('#placeCard').innerHTML = '<h2>顯示全部地點</h2><p>點流程卡、職能課程或地圖圖釘，可以快速查看該地點與 Google Maps 連結。</p>';
  if(userAction) history.replaceState(null, '', `${location.pathname}${location.search}`);
}
function renderNow(clock, found){
  currentEvent = found.current;
  nextEvent = found.next;
  if(found.current){
    const {day,event} = found.current;
    $('#nowPanel').innerHTML = `<small>正在進行 · ${clock.label}</small><strong>${event[1]}</strong><div class="lead">${day.label} · ${event[0]} · ${event[3]}</div><button type="button" data-jump-loc="${event[2]}">看現在地點</button>`;
    return;
  }
  if(found.next){
    const {day,event} = found.next;
    $('#nowPanel').innerHTML = `<small>下一段 · ${clock.label}</small><strong>${event[1]}</strong><div class="lead">${day.label} · ${event[0]} · ${event[3]}</div><button type="button" data-jump-loc="${event[2]}">看下一段地點</button>`;
    return;
  }
  $('#nowPanel').innerHTML = '<small>流程結束</small><strong>保持開掛，明年見</strong><div class="lead">2026 Youth Camp</div>';
}
function updatePinClasses(){
  const nowLoc = currentEvent?.event[2] || '';
  document.querySelectorAll('.pin').forEach(pin => {
    pin.classList.toggle('is-current', pin.dataset.loc === nowLoc);
  });
}
function updateNow(forceFlow){
  // ponytail: query override keeps QA cheap; normal visitors just use current Taipei time.
  const clock = taipeiClock(parseOverride(params.get('now')));
  const found = findNow(clock);
  const autoDay = found.current?.day.id || found.next?.day.id || selectedDay;
  if(!manualDay && autoDay !== selectedDay) selectedDay = autoDay;
  renderNow(clock, found);
  updateTabsSelected();
  if(forceFlow || flowDay !== selectedDay) renderFlow();
  updateFlowNow();
  updatePinClasses();
}
function bindEvents(){
  $('#dayTabs').addEventListener('click', event => {
    const tab = event.target.closest('.tab');
    if(!tab) return;
    manualDay = true;
    selectedDay = tab.dataset.day;
    updateTabsSelected();
    renderFlow();
    updateFlowNow();
  });
  $('#flow').addEventListener('click', event => {
    const card = event.target.closest('.flow-card');
    if(card) selectLocation(card.dataset.loc, true, true, false);
  });
  $('#courses').addEventListener('click', event => {
    const card = event.target.closest('.course-card');
    if(card) selectLocation(card.dataset.loc, true, true, false);
  });
  $('#nowPanel').addEventListener('click', event => {
    const button = event.target.closest('[data-jump-loc]');
    if(button) selectLocation(button.dataset.jumpLoc, true, true, false);
  });
  $('#mapStage').addEventListener('click', event => {
    const pin = event.target.closest('.pin');
    if(pin){
      selectLocation(pin.dataset.loc, false, true, true);
      return;
    }
    if(DEBUG) dropDebugCross(event);
  });
  $('#showAll').addEventListener('click', () => clearSelection(true));
}
function checkPinDistances(){
  for(let i = 0; i < PIN_IDS.length; i++){
    for(let j = i + 1; j < PIN_IDS.length; j++){
      const a = LOCATIONS[PIN_IDS[i]];
      const b = LOCATIONS[PIN_IDS[j]];
      const dist = Math.hypot(a.x - b.x, a.y - b.y);
      if(dist < 5) console.warn(`Pin overlap risk: ${PIN_IDS[i]} / ${PIN_IDS[j]} = ${dist.toFixed(1)}%`);
    }
  }
}
function enableDebug(){
  $('#mapStage').classList.add('debug');
}
function dropDebugCross(event){
  if(event.target.closest('.show-all')) return;
  const rect = $('#mapStage').getBoundingClientRect();
  const x = ((event.clientX - rect.left) / rect.width) * 100;
  const y = ((event.clientY - rect.top) / rect.height) * 100;
  console.log(`x: ${x.toFixed(1)}%, y: ${y.toFixed(1)}%`);
  const mark = document.createElement('span');
  mark.className = 'debug-cross';
  mark.style.left = `${x}%`;
  mark.style.top = `${y}%`;
  $('#mapStage').append(mark);
}
function selfTest(){
  [
    ['2026-07-07T09:30','潛能報到','arrival'],
    ['2026-07-07T12:30','前往教室、能量午餐','dining'],
    ['2026-07-08T18:30','晚會','adminHall'],
    ['2026-07-09T11:45','能量午餐（職能靜態展）','marble']
  ].forEach(([when,title,loc]) => {
    const found = findNow(taipeiClock(parseOverride(when)));
    console.assert(found.current?.event[1] === title, `${when} should be ${title}`);
    console.assert(found.current?.event[2] === loc, `${when} should be ${loc}`);
  });
  const boundary = findNow(taipeiClock(parseOverride('2026-07-07T23:50')));
  console.assert(!boundary.current, '2026-07-07T23:50 should have no current event');
  console.assert(boundary.next?.day.id === '2026-07-08' && boundary.next?.event[1] === '小隊晨間充電', '2026-07-07T23:50 next should be 7/8 小隊晨間充電');
}
function init(){
  const clock = taipeiClock(parseOverride(params.get('now')));
  const found = findNow(clock);
  currentEvent = found.current;
  nextEvent = found.next;
  selectedDay = found.current?.day.id || found.next?.day.id || DAYS[0].id;
  selectedLoc = location.hash.slice(1) || found.current?.event[2] || found.next?.event[2] || 'stu';
  renderTabs();
  renderCourses();
  renderPins();
  bindEvents();
  if(DEBUG) enableDebug();
  updateNow(true);
  selectLocation(selectedLoc, false, false, false);
  if(params.has('selftest')) selfTest();
  setInterval(() => updateNow(false), 30000);
}
init();
</script>
